# Kokoro SAPI engine controls — read by the engine every Speak.
# The app rewrites this (set_controls) when you change the narrator/sliders,
# so editing by hand only sets the startup defaults. Lines are key=value;
# blank lines and lines starting with # are ignored.

# Narrator voice id (see VOICES in src/voices.ts), e.g. af_heart, am_michael.
voice=af_heart

# Multiplies the host's reading rate. Clamped to 0.5–2.0.
speed=1

# Multiplies the host's volume. Clamped to 0.0–2.0.
gain=1
