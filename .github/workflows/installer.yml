name: Release (kokoro-reader installer)

# Builds the Windows installer with the x86 SAPI engine (KokoroSapi.dll) bundled
# in, then publishes it to a GitHub Release. The DLL is compiled FIRST, in the
# same job, because tauri.conf.json's `bundle.resources` pulls it from
# kokoro-sapi/build/ at bundle time — it must exist on disk before the bundler
# (run by tauri-action) executes. Windows-only: SAPI5 has no macOS/Linux peer.

on:
  # Pushing a version tag (e.g. v0.1.0) builds and publishes a release for it.
  push:
    tags: ['v*']
  # Or trigger a build on demand from the Actions tab.
  workflow_dispatch:

# tauri-action needs write access to create the release and upload installers.
permissions:
  contents: write

# A newer tag/dispatch supersedes an in-flight build.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # Must run before the bundler — produces kokoro-sapi/build/KokoroSapi.dll,
      # which tauri.conf.json's `bundle.resources` copies into the installer's
      # resources/ dir. build.ps1 sets its own x86 MSVC env in a cmd subshell, so
      # the amd64 env below doesn't disturb it.
      - name: Build SAPI engine (x86)
        shell: pwsh
        run: ./kokoro-sapi/build.ps1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Runs beforeBuildCommand (bun run build -> tsc + vite), bundles the
      # NSIS/MSI installers (embedding controls.ini + KokoroSapi.dll), then
      # uploads them to a draft GitHub Release. On a tag push the release uses
      # that tag; a manual run derives the tag from the version (__VERSION__).
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: kokoro-reader ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseBody: |
            Local, offline Kokoro-82M text-to-speech — Windows installer
            (.msi / NSIS .exe). Bundles the "Kokoro (SAPI5)" voice engine so
            32-bit hosts like Kindle for PC Read Aloud can narrate with Kokoro.

            The app downloads the Kokoro model on first launch; it is not
            bundled. The app must be running for the SAPI voice to speak.
          releaseDraft: true
          prerelease: false
